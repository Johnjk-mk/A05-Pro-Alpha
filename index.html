<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; text-align: center; margin: 0; }
        .container { border: 2px solid #00ffcc; padding: 15px; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; }
        .header { font-size: 18px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 5px #00ffcc; }
        .stat-grid { display: flex; justify-content: space-around; margin-bottom: 25px; font-size: 10px; color: #fff; }
        .btn-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .btn { background: #111; border: 1px solid #00ffcc; color: #00ffcc; padding: 16px; border-radius: 5px; font-weight: bold; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: #00ffcc; color: #000; transform: scale(0.98); }
        .footer { margin-top: 30px; font-size: 9px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">PRO ALPHA v20.0</div>
        
        <div class="stat-grid">
            <div>MODE: <b style="color:#00ffcc">EXTREME</b></div>
            <div>CORE: <b style="color:#00ffcc">G85-ULTR</b></div>
        </div>

        <div class="btn-list">
            <button class="btn" onclick="alert('ALPHA: Samsung GOS Bypassed!')">BYPASS SYSTEM LIMITS</button>
            <button class="btn" onclick="alert('ALPHA: Touch Response set to 1ms!')">TOUCH RESPONSE PRO</button>
            <button class="btn" onclick="alert('ALPHA: GPU Frequency Locked!')">FORCE MAX PERFORMANCE</button>
            <button class="btn" onclick="alert('ALPHA: Thermal Throttling Disabled!')">DISABLE HEAT LIMITS</button>
            <button class="btn" onclick="alert('ALPHA: RAM Buffers Flushed!')">PURGE SYSTEM CACHE</button>
        </div>

        <div class="footer">AUTHENTIC J-CODE FOR SAMSUNG A05</div>
    </div>
</body>
</html>
